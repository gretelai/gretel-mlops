dataset:
  name: churn
  path: s3://gretel-public-website/datasets/Churn_Modelling.csv
  target_column: Exited
  drop_columns: CustomerId
ML:
  ml_task: classification
  objective: binary:logistic
  objective_type: Maximize
  ml_eval_metric: f1
  ml_metric_threshold: 0.0
gretel:
  strategy: balance
  generate_factor: 1.0
  target_balance: 1.0